<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>INDIGOScript Client</title>

  <link rel="stylesheet" href="index.css">

  <script type="module" src="dist/index.js"></script>
</head>
<body>

  <div class="container">
    <body>

    <h1 style="text-align:center;">Página de pruebas - INDIGO CLIENT</h1>

    <p>Una página de prueba donde ejecutar la biblioteca. Abre la consola para ver los resultados de la ejecución.</p><br>
    
    <h2>Envia un mensaje al servidor.</h2>
    <input type="text" id="messageBox" name="messageBox" placeholder="Introduce un mensaje:" value=" ('{ &quot;getProperties&quot;: { &quot;version&quot;: 512, &quot;client&quot;: &quot;My Client&quot; } }') ">
    <button type="button" id="buttonSendMessage">Send message</button>
    
    <hr>
    <br>

    <h2>Ver propiedades almacenadas.</h2>
    <pre id="propertyDisplayBox"></pre>
    <button type="button" id="buttonPrintProperties">Print Properties</button>
    <button type="button" id="buttonCopyProperties">Copy to Clipboard</button>
  </div>

</body>
</html>
